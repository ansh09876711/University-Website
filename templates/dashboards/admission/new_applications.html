<!DOCTYPE html>
<html>
<head>
<title>New Applications</title>

<style>

body{
font-family:Segoe UI;
background:#eef2f7;
margin:0;
}

/* HEADER */
.header{
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
padding:25px;
text-align:center;
font-size:24px;
font-weight:bold;
}

/* CONTAINER */
.container{
width:1100px;
margin:40px auto;
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#2563eb;
color:white;
padding:14px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
}

tr:hover{
background:#f9fafb;
}

/* STATUS BADGE */
.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:500;
}

.pending{
background:#fef3c7;
color:#92400e;
}

.approved{
background:#dcfce7;
color:#166534;
}

.rejected{
background:#fee2e2;
color:#991b1b;
}

/* BACK BUTTON */
.back{
display:inline-block;
margin-top:20px;
background:#2563eb;
color:white;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
transition:0.3s;
}

.back:hover{
background:#1e40af;
}

.empty{
text-align:center;
padding:30px;
color:#6b7280;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
📝 New Applications
</div>

<div class="container">

{% if applications %}

<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Course</th>
<th>Status</th>
</tr>

{% for a in applications %}

<tr>
<td>{{ a.full_name }}</td>
<td>{{ a.email }}</td>
<td>{{ a.mobile }}</td>
<td>{{ a.course }}</td>
<td>
<span class="status {{ a.status }}">
{{ a.status|capitalize }}
</span>
</td>
</tr>

{% endfor %}

</table>

{% else %}

<div class="empty">
No new applications found 🚫
</div>

{% endif %}

<a href="/admission" class="back">⬅ Back to Dashboard</a>

</div>

</body>
</html>
