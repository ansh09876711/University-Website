<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>

<style>

body{
    font-family:Poppins, sans-serif;
    background:linear-gradient(135deg,#e9f0ff,#f8fbff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.otp-box{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,0,0,0.08);
    width:360px;
    text-align:center;
}

/* Heading */
.otp-box h2{
    margin-bottom:10px;
}

.otp-box p{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

/* Input */
.otp-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ddd;
    font-size:16px;
    text-align:center;
    letter-spacing:3px;
}

/* Button */
.otp-box button{
    width:100%;
    padding:12px;
    background:#2f5bea;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.otp-box button:hover{
    background:#1e45c9;
}

.resend{
    margin-top:15px;
    font-size:13px;
}

.resend a{
    color:#2f5bea;
    text-decoration:none;
}

.resend a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="otp-box">

<h2>Verify OTP 🔐</h2>
<p>Enter the 6-digit OTP sent to your email</p>

<form method="POST">

    <input type="text" 
           name="otp" 
           maxlength="6"
           placeholder="------"
           required>

    <button>Verify OTP</button>

</form>

<div class="resend">
    Didn't receive OTP? <a href="/forgot-password">Resend</a>
</div>

</div>

</body>
</html>
