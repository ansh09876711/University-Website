<!DOCTYPE html>
<html>
<head>
<title>HR FINAL BOSS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#f4f6fb;
color:#1e293b;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
background:white;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.header h1{
margin:0;
font-size:26px;
}

/* CONTAINER */
.container{
padding:40px;
max-width:1300px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

/* CARD */
.card{
background:white;
padding:28px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
transition:0.3s;
text-decoration:none;
color:#1e293b;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 14px 30px rgba(0,0,0,0.1);
}

.card-title{
font-weight:600;
margin-bottom:10px;
}

.stat{
font-size:28px;
font-weight:600;
color:#2563eb;
}

/* PREMIUM MODULE BUTTONS */

.module{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

height:100px;
border-radius:14px;
background:linear-gradient(135deg,#ffffff,#f8fafc);
border:1px solid #e2e8f0;

font-weight:600;
font-size:16px;
color:#3b2fe0;

transition:0.35s;
cursor:pointer;
position:relative;
overflow:hidden;
}

.module:hover{
transform:translateY(-5px);
box-shadow:0 15px 30px rgba(37,99,235,0.15);
background:linear-gradient(135deg,#eff6ff,#ffffff);
color:#00040d;
}

/* Shine Animation */
.module::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
transition:0.5s;
}

.module:hover::before{
left:100%;
}
.btn{
background:#2563eb;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.back-btn{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
color:#2563eb;
font-weight:600;
background:#eff6ff;
padding:8px 14px;
border-radius:8px;
transition:0.3s;
}

.back-btn:hover{
background:#dbeafe;
}
</style>
</head>

<body>

<div class="header">

<h1>👑 HR </h1>
</div>
<a href="/admin" class="back-btn">⬅ Back to Admin Dashboard</a>
<div class="container">

<div class="grid">

<!-- STATS -->
<div class="card">
<div class="card-title">Total Employees</div>
<div class="stat">{{total_staff}}</div>
</div>

<div class="card">
<div class="card-title">Pending Leaves</div>
<div class="stat">{{pending_leaves}}</div>
</div>

<div class="card">
<div class="card-title">Total Payroll</div>
<div class="stat">₹ {{total_salary}}</div>
</div>

<!-- MODULES -->

<a href="/hr/employees" class="card module">👥 Employee Manager</a>
<a href="/hr/teachers" class="card module">👨‍🏫 Teacher Manager</a>
<a href="/hr/leaves" class="card module">📄 Leave Engine</a>
<a href="/hr/payroll" class="card module">💰 Payroll Engine</a>
<a href="/hr/attendance" class="card module">📊 Attendance Engine</a>
<a href="/hr/recruitment" class="card module">🚀 Recruitment Engine</a>

</div>

</div>

</body>
</html>
