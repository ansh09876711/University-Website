<!DOCTYPE html>
<html>
<head>

<title>Create Test</title>

<style>

body{
font-family:Segoe UI;
background:#020617;
color:white;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

h2{
margin-bottom:20px;
}

.card{
background:#020617;
border:1px solid #1e293b;
padding:25px;
border-radius:14px;
margin-bottom:30px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
background:#020617;
border:1px solid #334155;
color:white;
border-radius:8px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{
background:#22c55e;
color:black;
}

.secondary{
background:#2563eb;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

.qbox{
border:1px solid #334155;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.test-card{
border:1px solid #1e293b;
padding:20px;
border-radius:14px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.actions button{
margin-left:10px;
}
.date-input{
background:#020617;
border:1px solid #334155;
color:white;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.date-input::-webkit-calendar-picker-indicator{
filter:invert(1);
cursor:pointer;
}
.qbox{
border:1px solid #1e293b;
padding:20px;
border-radius:12px;
margin-bottom:15px;
background:#020617;
}

.q-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
color:white;
font-weight:600;
}

.remove-btn{
background:#ef4444;
border:none;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.remove-btn:hover{
background:#dc2626;
}
.back-btn{
display:inline-block;
margin-bottom:20px;
color:#38bdf8;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.back-btn:hover{
color:#22c55e;
}
</style>

</head>

<body>

<div class="container">

<a href="/teacher" class="back-btn">⬅ Back to Dashboard</a>

<h2>📝 Create Test (Google Form Style)</h2>

<div class="card">

<form method="POST" enctype="multipart/form-data">

<input name="title" placeholder="Test Title" required>

<select name="class_id">
{% for c in classes %}
<option value="{{c.id}}">{{c.class_name}}</option>
{% endfor %}
</select>

<label>Deadline</label>
<input 
    type="datetime-local" 
    name="deadline" 
    required
    min="{{ current_time.strftime('%Y-%m-%dT%H:%M') }}"
    class="date-input">

<input type="file" name="file">

<hr>

<h3>Questions</h3>

<div id="questions">

<div class="qbox">

<div class="q-header">
<span>Question</span>
<button type="button" class="remove-btn" onclick="removeQ(this)">✖</button>
</div>

<input name="question[]" placeholder="Question">

<input name="opt1[]" placeholder="Option 1">
<input name="opt2[]" placeholder="Option 2">
<input name="opt3[]" placeholder="Option 3">
<input name="opt4[]" placeholder="Option 4">

<input name="correct[]" placeholder="Correct Answer">

</div>

</div>

<br>

<button type="button" class="secondary" onclick="addQ()">+ Add Question</button>

<br><br>

<button class="primary">Create Test</button>

</form>

</div>

<!-- ================== YOUR TESTS ================= -->

<h2>Your Tests</h2>

{% for t in tests %}

<div class="test-card">

<div>
<h3>{{t.title}}</h3>
<p>Class ID : {{t.class_id}}</p>
</div>

<div class="actions">

<!-- QUICK ACTION SUBMISSIONS -->
<a href="/teacher/test-submissions/{{t.id}}">
<button class="secondary">View Submissions</button>
</a>

<form action="/teacher/delete-test/{{t.id}}" method="POST" style="display:inline;">
<button class="delete">Delete</button>
</form>

</div>

</div>

{% endfor %}

</div>

<script>

function addQ(){

let div=document.createElement("div");

div.className="qbox";

div.innerHTML=`
<input name="question[]" placeholder="Question">
<input name="opt1[]" placeholder="Option 1">
<input name="opt2[]" placeholder="Option 2">
<input name="opt3[]" placeholder="Option 3">
<input name="opt4[]" placeholder="Option 4">
<input name="correct[]" placeholder="Correct Answer">
`;

document.getElementById("questions").appendChild(div);

}

</script>
<script>

function addQ(){

let div=document.createElement("div");

div.className="qbox";

div.innerHTML=`
<div class="q-header">
<span>Question</span>
<button type="button" class="remove-btn" onclick="removeQ(this)">✖</button>
</div>

<input name="question[]" placeholder="Question">

<input name="opt1[]" placeholder="Option 1">
<input name="opt2[]" placeholder="Option 2">
<input name="opt3[]" placeholder="Option 3">
<input name="opt4[]" placeholder="Option 4">

<input name="correct[]" placeholder="Correct Answer">
`;

document.getElementById("questions").appendChild(div);

}

function removeQ(btn){

btn.closest(".qbox").remove();

}

</script>
</body>
</html>
