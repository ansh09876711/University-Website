<!DOCTYPE html>
<html>
<head>

<title>EDUSTACK UNIVERSITY</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== RESET ===== */

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:linear-gradient(120deg,#1f02fb,#c3c0c0);
color:white;
}

/* ===== NAVBAR ===== */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:white;
color:black;
}

.logo{
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.nav-links a{
margin:0 10px;
text-decoration:none;
color:black;
padding:10px 20px;
border-radius:30px;
border:1px solid #cfd2ff;
transition:.3s;
}

.nav-links a:hover{
background:#2f3cff;
color:white;
}

/* ===== CONTENT AREA ===== */

.page-container{
max-width:1100px;
margin:70px auto;
padding:40px;
background:rgba(255,255,255,0.08);
border-radius:15px;
backdrop-filter:blur(10px);
}

.page-container h1{
font-size:42px;
margin-bottom:20px;
}

.page-container p{
font-size:18px;
line-height:1.8;
}

/* ===== BACK BUTTON ===== */

.back-btn{
margin-top:40px;
display:inline-block;
padding:12px 25px;
background:#ffd700;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:6px;
}

/* ===== FOOTER ===== */

.footer{
margin-top:80px;
text-align:center;
padding:30px;
background:rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<!-- ===== NAVBAR ===== -->

<div class="navbar">

<div class="logo">EDUSTACK UNIVERSITY</div>

<div class="nav-links">

<a href="/">Home</a>
<a href="#">About</a>
<a href="#">Academics</a>
<a href="#">Faculty</a>
<a href="#">Placements</a>
<a href="#">Courses</a>
<a href="/login">Login</a>

</div>

</div>

<!-- ===== PAGE CONTENT ===== -->

<div class="page-container">

{% block content %}

{% endblock %}

<a href="/" class="back-btn">⬅ Back to Home</a>

</div>

<!-- ===== FOOTER ===== -->

<div class="footer">

© 2026 Edustack University | All Rights Reserved

</div>

</body>

</html>
