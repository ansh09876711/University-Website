<!DOCTYPE html>
<html>
<head>
<title>Registrar Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.back-btn{
background:#1e40af;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
color:#2563eb;
}

.card p{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.chart-box{
background:white;
padding:25px;
border-radius:12px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

height:350px;   /* ADD THIS */
position:relative;
}

.chart-box canvas{
max-height:280px !important;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>📊 Registrar Analytics Dashboard</h2>
<a href="/registrar" class="back-btn">⬅ Back</a>
</div>

<!-- STATS CARDS -->

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p>{{ total_students }}</p>
</div>

<div class="card">
<h3>Total Classes</h3>
<p>{{ total_classes }}</p>
</div>

<div class="card">
<h3>Average CGPA</h3>
<p>{{ avg_cgpa }}</p>
</div>

<div class="card">
<h3>Total Faculties</h3>
<p>{{ total_faculty }}</p>
</div>

</div>

<!-- CHART 1 -->

<div class="chart-box">
<h3>📈 Students Per Class</h3>
<canvas id="classChart"></canvas>
</div>

<!-- CHART 2 -->

<div class="chart-box">
<h3>🥧 CGPA Distribution</h3>
<canvas id="cgpaChart"></canvas>
</div>

</div>

<script>

const classLabels = {{ class_labels|safe }};
const classData = {{ class_data|safe }};

new Chart(document.getElementById("classChart"),{
type:'bar',
data:{
labels: classLabels,
datasets:[{
label:'Students',
data: classData,
backgroundColor:'#2563eb'
}]
},
options:{
responsive:true,
maintainAspectRatio:false   // ⭐ IMPORTANT
}
});

const cgpaLabels = {{ cgpa_labels|safe }};
const cgpaData = {{ cgpa_data|safe }};

new Chart(document.getElementById("cgpaChart"),{
type:'pie',
data:{
labels: cgpaLabels,
datasets:[{
data: cgpaData
}]
},
options:{
responsive:true,
maintainAspectRatio:false   // ⭐ IMPORTANT
}
});

</script>

</body>
</html>
