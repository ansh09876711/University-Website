<!DOCTYPE html>
<html>
<head>

<title>Notices | EDUSTACK</title>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#3b1dd1,#7c3aed);
color:white;
}

.container{
padding:60px;
text-align:center;
}

.notice-card{
background:rgba(255,255,255,0.1);
margin:20px auto;
width:70%;
padding:20px;
border-radius:12px;
backdrop-filter:blur(10px);
transition:0.3s;
}

.notice-card:hover{
transform:scale(1.02);
background:rgba(255,255,255,0.15);
}

</style>

</head>

<body>

<div class="container">

<h1>📢 University Notices</h1>

<div class="notice-card">
Mid Semester Examination starts from 12 March 2026.
</div>

<div class="notice-card">
Annual Tech Fest registrations open now.
</div>

<div class="notice-card">
Placement Drive scheduled next week.
</div>

</div>

</body>
</html>
