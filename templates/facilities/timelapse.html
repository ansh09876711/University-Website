<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Timelapse | EDUSTACK UNIVERSITY</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f8f9ff);
}

/* ================= HERO ================= */

.hero{
    position:relative;
    padding:100px 20px;
    text-align:center;
    color:white;
    background:linear-gradient(135deg,#3b1dd1,#7c3aed,#9333ea);
    background-size:400% 400%;
    animation:gradientMove 8s ease infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.hero h1{
    font-size:48px;
    margin:0;
    letter-spacing:1px;
}

.hero p{
    margin-top:15px;
    font-size:18px;
    opacity:0.9;
}

/* ================= GALLERY ================= */

.gallery-container{
    max-width:1400px;
    margin:auto;
    padding:80px 30px;
}

.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:35px;
}

/* ================= CARD ================= */

.gallery-card{
    position:relative;
    overflow:hidden;
    border-radius:20px;
    cursor:pointer;
    transition:.4s ease;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
    background:white;
}

.gallery-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    transition:.6s ease;
}

/* Hover Animation */
.gallery-card:hover{
    transform:translateY(-12px);
    box-shadow:0 25px 60px rgba(91,33,182,0.35);
}

.gallery-card:hover img{
    transform:scale(1.1);
}

/* ================= OVERLAY ================= */

.overlay{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:25px;
    background:linear-gradient(transparent,rgba(0,0,0,0.85));
    color:white;
    font-size:18px;
    font-weight:600;
    transform:translateY(100%);
    transition:.4s ease;
}

.gallery-card:hover .overlay{
    transform:translateY(0);
}

/* Responsive */
@media(max-width:768px){
    .hero h1{
        font-size:32px;
    }
    .gallery-card img{
        height:240px;
    }
}

</style>

</head>

<body>

<!-- HERO -->

<section class="hero">
    <h1>Timelapse Events</h1>
    <p>Moments of energy, creativity and unforgettable campus life</p>
</section>

<!-- GALLERY -->

<section class="gallery-container">

<div class="gallery-grid">

<div class="gallery-card">
<img src="/static/timelapse/01.jpg">
<div class="overlay">Live Performance</div>
</div>

<div class="gallery-card">
<img src="/static/timelapse/02_11img.webp">
<div class="overlay">Dance Event</div>
</div>

<div class="gallery-card">
<img src="/static/timelapse/04.jpg">
<div class="overlay">Music Night</div>
</div>

<div class="gallery-card">
<img src="/static/timelapse/10_img.webp">
<div class="overlay">Stage Performance</div>
</div>

<div class="gallery-card">
<img src="/static/timelapse/11img-1.webp">
<div class="overlay">Rock Show</div>
</div>

<div class="gallery-card">
<img src="/static/timelapse/15.jpg">
<div class="overlay">Crowd Energy</div>
</div>

</div>

</section>

</body>
</html>
