<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<style>

body{
    font-family:Poppins, sans-serif;
    background:#f4f6fb;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card */
.reset-box{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.08);
    width:350px;
    text-align:center;
}

/* Heading */
.reset-box h2{
    margin-bottom:20px;
}

/* Input */
.reset-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ddd;
    font-size:14px;
}

/* Button */
.reset-box button{
    width:100%;
    padding:12px;
    background:#2f5bea;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.reset-box button:hover{
    background:#1e45c9;
}

</style>
</head>

<body>

<div class="reset-box">

<h2>Reset Password 🔒</h2>

<form method="POST">

    <input type="password" 
           name="new_password" 
           placeholder="Enter New Password"
           required>

    <button>Update Password</button>

</form>

</div>

</body>
</html>
