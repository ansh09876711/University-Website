<!DOCTYPE html>
<html>
<head>
<title>Leaderboard</title>
</head>

<body>

<h2>🏆 Top Students</h2>

<table border="1" cellpadding="10">

<tr>
<th>Rank</th>
<th>Name</th>
<th>Class</th>
<th>Average Marks</th>
</tr>

{% for t in toppers %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ t.student_name }}</td>
<td>{{ t.class_name }}</td>
<td>{{ t.avg_marks }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
