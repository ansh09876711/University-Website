<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mechanical Engineering | EduStack</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:white;
overflow-x:hidden;
}

/* NAVBAR */

header{
position:fixed;
top:0;
width:100%;
padding:20px 80px;
display:flex;
justify-content:space-between;
align-items:center;
background:#020617;
color:white;
z-index:1000;
}

header nav a{
margin-left:30px;
color:#cbd5e1;
text-decoration:none;
}

header nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:#020617;
color:white;
position:relative;
}

.hero-content{
position:relative;
z-index:10;
}

.hero h1{
font-size:60px;
}

.hero p{
color:#cbd5e1;
}

#bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

</style>

</head>


<body>


<header>

<h2>EDUSTACK UNIVERSITY</h2>

<nav>
<a href="#">Home</a>
<a href="#">Academics</a>
<a href="#">Research</a>
<a href="#">Placements</a>
</nav>

</header>



<section class="hero">

<div class="hero-content">

<h1>Mechanical Engineering</h1>

<p>
Automation, Robotics, Manufacturing and Smart Industry
</p>

</div>

<canvas id="bg"></canvas>

</section>



<script>

/* SCENE */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 10;


/* RENDERER */

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("bg"),
alpha:true,
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);


/* LIGHT */

const light = new THREE.PointLight(0xffffff,1.5);
light.position.set(5,5,5);
scene.add(light);


/* MATERIAL */

const material = new THREE.MeshStandardMaterial({

color:0x38bdf8,
metalness:0.9,
roughness:0.2

});


/* RINGS */

const ring1 = new THREE.Mesh(
new THREE.TorusGeometry(2.5,0.5,20,100),
material
);

ring1.position.x = -3;


const ring2 = new THREE.Mesh(
new THREE.TorusGeometry(1.8,0.4,20,100),
material
);

ring2.position.x = 1;


const ring3 = new THREE.Mesh(
new THREE.TorusGeometry(1.2,0.35,20,100),
material
);

ring3.position.x = 4;


/* ADD TO SCENE */

scene.add(ring1);
scene.add(ring2);
scene.add(ring3);


/* ANIMATION */

function animate(){

requestAnimationFrame(animate);

/* ROTATION */

ring1.rotation.z += 0.01;
ring2.rotation.z -= 0.015;
ring3.rotation.z += 0.02;

/* FLOATING EFFECT */

ring1.position.y = Math.sin(Date.now()*0.001)*0.2;
ring2.position.y = Math.cos(Date.now()*0.001)*0.2;
ring3.position.y = Math.sin(Date.now()*0.001)*0.15;

renderer.render(scene,camera);

}

animate();


/* RESPONSIVE */

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>


</body>
</html>
