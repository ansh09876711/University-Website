<!DOCTYPE html>
<html>
<head>
<title>Academic Records</title>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.back-btn{
background:#1e40af;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.table-box{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid #ddd;
}

th{
background:#2563eb;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>📘 Academic Records</h2>

<a href="/registrar" class="back-btn">⬅ Back</a>
</div>

<div class="table-box">

<table>

<table>
<tr>
<th>Name</th>
<th>Enrollment</th>
<th>Class</th>
<th>Semester</th>
<th>CGPA</th>
</tr>

{% for r in records %}
<tr>
<td>{{ r.username }}</td>
<td>{{ r.enrollment_no }}</td>
<td>{{ r.class_name }}</td>
<td>{{ r.semester }}</td>
<td>{{ r.cgpa }}</td>
</tr>
{% endfor %}
</table>

</div>

</div>

</body>
</html>
