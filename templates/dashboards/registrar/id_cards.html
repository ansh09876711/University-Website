<!DOCTYPE html>
<html>
<head>
<title>ID Cards</title>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

/* ================= ID CARD ================= */

.id-card{
width:700px;
background:linear-gradient(135deg,#2563eb,#1e40af);
color:white;
border-radius:18px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-top:25px;
}

/* ===== HEADER ===== */

.top-header{
background:white;
border-radius:12px;
padding:12px 20px;
display:flex;
align-items:center;
gap:15px;
margin-bottom:20px;
}

.college-logo{
width:120px;
height:auto;
object-fit:contain;
filter:drop-shadow(0 2px 3px rgba(0,0,0,0.2));
}
.college-name{
color:#1e40af;
font-size:28px;
font-weight:900;
margin:0;
}

/* ===== CONTENT AREA ===== */

.card-body{
display:flex;
justify-content:space-between;
align-items:flex-start;
}

/* LEFT DETAILS */

.left p{
font-size:16px;
margin:10px 0;
}

/* RIGHT PHOTO (REAL ID CARD STYLE) */

.photo-box{
background:white;
padding:6px;
border-radius:12px;
}

.photo-box img{
width:150px;
height:170px;
border-radius:10px;
object-fit:cover;
}

/* BUTTONS */

select{
padding:10px;
border-radius:6px;
}

.btn{
padding:10px 15px;
background:#10b981;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.print-btn{
background:#f59e0b;
}

.upload-box{
margin-top:15px;
}
.back-btn{
background:#1e40af;
color:white;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.back-btn:hover{
background:#1e3a8a;
transform:translateY(-1px);
}
</style>
</head>

<body>

<div class="container">

<h2>🎓 Ultra Pro ID Card Generator</h2>

<a href="/registrar" class="back-btn">⬅ Back</a>

<select id="studentSelect">
<option value="">Select Student</option>

{% for s in students %}
<option value="{{s.id}}"
data-name="{{s.username}}"
data-enrollment="{{s.enrollment_no}}"
data-father="{{s.father_name}}"
data-dob="{{s.dob}}"
data-contact="{{s.contact}}"
data-photo="{{s.photo}}">
{{s.username}}
</option>
{% endfor %}
</select>

<button class="btn" onclick="generatePDF()">Download PDF</button>
<button class="btn print-btn" onclick="window.print()">Print</button>

<!-- PHOTO UPLOAD -->

<div class="upload-box">

<form id="photoForm" method="POST" enctype="multipart/form-data">
<input type="file" name="photo" required>
<button class="btn">Upload Photo</button>
</form>

</div>

<!-- ================= ID CARD ================= -->

<div class="id-card" id="card" style="display:none;">

<!-- HEADER -->

<div class="top-header">

<img class="college-logo"
src="{{ url_for('static', filename='logo.png') }}">

<h3 class="college-name">EDUSTACK UNIVERSITY</h3>

</div>

<!-- BODY -->

<div class="card-body">

<div class="left">

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Enrollment:</b> <span id="enrollment"></span></p>
<p><b>Father:</b> <span id="father"></span></p>
<p><b>DOB:</b> <span id="dob"></span></p>
<p><b>Contact:</b> <span id="contact"></span></p>

</div>

<div class="photo-box">
<img id="photo" src="">
</div>

</div>

</div>

</div>

<script>

let selectedID = null;

document.getElementById("studentSelect").addEventListener("change",function(){

let s = this.options[this.selectedIndex];
if(!s.value) return;

selectedID = s.value;

document.getElementById("photoForm").action =
"/registrar/upload-photo/"+selectedID;

document.getElementById("card").style.display="block";

document.getElementById("name").innerText = s.dataset.name;
document.getElementById("enrollment").innerText = s.dataset.enrollment;
document.getElementById("father").innerText = s.dataset.father;
document.getElementById("dob").innerText = s.dataset.dob;
document.getElementById("contact").innerText = s.dataset.contact;

if(s.dataset.photo){
document.getElementById("photo").src =
"/static/uploads/"+s.dataset.photo;
}

});

function generatePDF(){

if(selectedID){
window.location.href="/registrar/generate-id/"+selectedID;
}

}

</script>

</body>
</html>
