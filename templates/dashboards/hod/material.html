<!DOCTYPE html>
<html>
<head>
    <title>HOD Study Materials</title>

    <style>
        body{
            font-family:Segoe UI;
            background:#f4f6f9;
            padding:30px;
        }

        h2{
            margin-bottom:20px;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .filter-form{
            display:flex;
            gap:10px;
        }

        select, button{
            padding:8px 12px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            background:#1e73d8;
            color:white;
            border:none;
            cursor:pointer;
        }

        .reset-btn{
            background:#6c757d;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        th{
            background:#1e73d8;
            color:white;
            padding:12px;
            text-align:left;
        }

        td{
            padding:12px;
            border-bottom:1px solid #eee;
        }

        tr:hover{
            background:#f2f7ff;
        }

        .teacher-tag{
            background:#ffc107;
            padding:4px 10px;
            border-radius:20px;
            font-size:12px;
        }

        .preview-btn{
            background:#28a745;
            padding:6px 12px;
            border-radius:20px;
            color:white;
            text-decoration:none;
            cursor:pointer;
        }

        iframe{
            width:100%;
            height:500px;
            margin-top:20px;
            border-radius:10px;
            border:none;
        }

        .no-data{
            text-align:center;
            padding:20px;
            background:white;
            border-radius:10px;
        }

    </style>
</head>

<body>

<h2>📚 Study Materials (Class-wise & Subject-wise)</h2>

<div class="top-bar">

    <form method="GET" class="filter-form">

        <select name="class">
            <option value="">All Classes</option>
            {% for c in classes %}
                <option value="{{ c[0] }}"
                {% if selected_class == c[0] %}selected{% endif %}>
                    {{ c[0] }}
                </option>
            {% endfor %}
        </select>

        <select name="subject">
            <option value="">All Subjects</option>
            {% for s in subjects %}
                <option value="{{ s[0] }}"
                {% if selected_subject == s[0] %}selected{% endif %}>
                    {{ s[0] }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Apply</button>

        <a href="/hod/material">
            <button type="button" class="reset-btn">Reset</button>
        </a>

    </form>

</div>

{% if materials %}

<table>
    <thead>
        <tr>
            <th>Class</th>
            <th>Subject</th>
            <th>Title</th>
            <th>Uploaded By</th>
            <th>Preview</th>
        </tr>
    </thead>

    <tbody>
        {% for m in materials %}
        <tr>
            <td>{{ m[0] }}</td>
            <td>{{ m[1] }}</td>
            <td>{{ m[2] }}</td>
            <td><span class="teacher-tag">{{ m[4] }}</span></td>
            <td>
                <button class="preview-btn"
                        onclick="previewFile('{{ m[3] }}')">
                        View
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<div id="preview-container"></div>

{% else %}

<div class="no-data">
    No materials found for selected filter.
</div>

{% endif %}

<script>
function previewFile(url){
    document.getElementById("preview-container").innerHTML =
        "<iframe src='" + url + "'></iframe>";
}
</script>

</body>
</html>
