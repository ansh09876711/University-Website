<!DOCTYPE html>
<html>
<head>
<title>Examinations | EDUSTACK</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#3b1dd1,#7c3aed);
color:white;
}

.container{
text-align:center;
padding:60px 20px;
}

.grid{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.card{
width:260px;
padding:25px;
background:rgba(255,255,255,0.1);
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
background:rgba(255,255,255,0.2);
}

</style>

</head>

<body>

<div class="container">

<h1>📚 Examination Section</h1>

<div class="grid">

<div class="card">
<h3>Time Table</h3>
<p>View latest examination schedules.</p>
</div>

<div class="card">
<h3>Results</h3>
<p>Check academic results and performance.</p>
</div>

<div class="card">
<h3>Notices</h3>
<p>Latest examination updates & announcements.</p>
</div>

<div class="card">
<h3>Academic Calendar</h3>
<p>Important academic dates.</p>
</div>

</div>

</div>

</body>
</html>
