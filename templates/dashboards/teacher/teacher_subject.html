<!DOCTYPE html>
<html>
<head>

<title>Teacher Subjects</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

.container{
    padding:30px;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:10px;
}

.header h2{
    margin:0;
}

/* FORM */

.form-box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.08);
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ddd;
}

button{
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

/* SUBJECT GRID */

.subject-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    margin-top:30px;
}

.subject-card{
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0px 4px 12px rgba(0,0,0,0.08);
    transition:0.3s;
}

.subject-card:hover{
    transform:translateY(-5px);
    box-shadow:0px 8px 20px rgba(0,0,0,0.15);
}

.icon{
    font-size:35px;
    margin-bottom:10px;
}

.subject-title{
    font-size:18px;
    font-weight:bold;
}

.subject-info{
    color:#555;
    font-size:14px;
}

.open-btn{
    margin-top:15px;
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:8px 14px;
    border-radius:6px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">
<a href="/teacher">
    <button type="button" style="margin-bottom:15px;">
        ← Back
    </button>
</a>

    <div class="header">
        <h2>📘 My Subjects</h2>
    </div>


    <!-- ADD SUBJECT FORM -->

    <div class="form-box">

        <form method="POST" action="/teacher/add-subject">

            <label>Subject Name</label>
            <input name="subject_name" required>

            <label>Credits</label>
            <input name="credits" required>

            <label>Subject Type</label>
            <select name="type">
                <option value="Core">Core</option>
                <option value="Elective">Elective</option>
                <option value="Lab">Lab</option>
            </select>

            <label>Class</label>
            <select name="class_id">

                {% for c in classes %}
                    <option value="{{ c.id }}">{{ c.class_name }}</option>
                {% endfor %}

            </select>

            <button>Add Subject</button>

        </form>

    </div>


    <!-- SUBJECT LIST -->

    <div class="subject-grid">

        {% for subject in subjects %}

        <div class="subject-card">

            <div class="icon">📚</div>

            <div class="subject-title">
                {{ subject.subject_name }}
            </div>

            <div class="subject-info">
                Class: {{ subject.class_name }} <br>
                Credits: {{ subject.credits }}
            </div>

            <a href="/teacher/assignments?subject={{ subject.id }}" class="open-btn">
                Open
            </a>

        </div>

        {% else %}
        <p>No subjects added yet</p>
        {% endfor %}

    </div>

</div>

</body>
</html>
