<!DOCTYPE html>
<html>
<head>
<title>Teacher Profile</title>

<style>

body{
    font-family:Segoe UI;
    background:#f3f4f6;
}

.profile-box{
    width:720px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:14px;
    box-shadow:0 8px 30px rgba(0,0,0,0.1);
}

.profile-photo{
    width:120px;
    height:120px;
    border-radius:50%;
    border:4px solid #2563eb;
    object-fit:cover;
}

.input{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ccc;
}

.input:focus{
    outline:none;
    border:1px solid #2563eb;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1e40af;
}

.success{
    background:#dcfce7;
    color:#166534;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
}
.back-link{
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
    display:inline-block;
    margin-bottom:15px;
}

.back-link:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="profile-box">

<a href="/teacher">
    <button type="button" style="margin-bottom:15px;">
        ← Back
    </button>
</a>

<h2>👨‍🏫 Teacher Profile</h2>

{% if request.args.get("updated") %}
<div class="success">
    ✅ Profile Updated Successfully
</div>
{% endif %}

<form method="POST" enctype="multipart/form-data">

<img src="/static/uploads/{{ teacher.photo if teacher and teacher.photo else 'default.png' }}"
class="profile-photo">

<br><br>

<label>NAME</label>
<input name="name" class="input"
       value="{{ teacher.name if teacher else '' }}">

<label>SURNAME</label>
<input name="surname" class="input"
       value="{{ teacher.surname if teacher else '' }}">

<label>EMAIL</label>
<input name="email" class="input"
       value="{{ teacher.email if teacher else '' }}">

<label>ADDRESS</label>
<input name="address" class="input"
       value="{{ teacher.address if teacher else '' }}">

<hr>

<button type="submit">Save Changes</button>

</form>

</div>

</body>
</html>
