<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="/static/style.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">

    <style>
        body {
            background: #020617;
            color: #ffffff;
            font-family: "Segoe UI", sans-serif;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            margin-bottom: 5px;
        }

        .subtext {
            opacity: 0.7;
            margin-bottom: 25px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 18px;
            padding: 22px;
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: #fff;
            outline: none;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 999px;
            border: none;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-danger {
            background: #dc2626;
        }

        .switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .switch input {
            transform: scale(1.3);
        }

        .back {
            display: inline-block;
            margin-top: 30px;
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <h1>⚙️ Settings</h1>
    <div class="subtext">Manage your account preferences</div>

    <div class="settings-grid">

        <!-- ACCOUNT SETTINGS -->
        <div class="card">
            <h2>👤 Account Settings</h2>

            <div class="form-group">
                <label>Username</label>
                <input type="text" value="{{ session.username }}" disabled>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="student@email.com">
            </div>

            <button class="btn">💾 Save Changes</button>
        </div>

        <!-- PASSWORD SETTINGS -->
        <div class="card">
            <h2>🔐 Change Password</h2>

            <div class="form-group">
                <label>Current Password</label>
                <input type="password" placeholder="Current password">
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" placeholder="New password">
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" placeholder="Confirm new password">
            </div>

            <button class="btn">🔁 Update Password</button>
        </div>

        <!-- NOTIFICATION SETTINGS -->
        <div class="card">
            <h2>🔔 Notifications</h2>

            <div class="switch">
                <span>Email Notifications</span>
                <input type="checkbox" checked>
            </div>

            <div class="switch">
                <span>SMS Alerts</span>
                <input type="checkbox">
            </div>

            <div class="switch">
                <span>Assignment Reminders</span>
                <input type="checkbox" checked>
            </div>
        </div>

        <!-- DANGER ZONE -->
        <div class="card">
            <h2>⚠️ Danger Zone</h2>

            <p style="opacity:0.7;font-size:14px;">
                Logging out will end your current session.
            </p>

            <a href="/logout">
                <button class="btn btn-danger">🚪 Logout</button>
            </a>
        </div>

    </div>

    <a href="/student" class="back">⬅ Back to Dashboard</a>

</div>

</body>
</html>
