<!DOCTYPE html>
<html>
<head>
<title>Student Profile</title>

<style>

body{
font-family:Segoe UI;
background:#f3f4f6;
}

.profile-box{
width:700px;
margin:60px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.profile-photo{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #2563eb;
object-fit:cover;
}

.input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="profile-box">

<form method="POST" enctype="multipart/form-data">

<img src="/static/uploads/{{ teacher.photo if teacher.photo else 'default.png' }}"
class="profile-photo">

<br><br>

<label>Name</label>
<input name="name" class="input" value="{{ teacher.name }}">

<label>Surname</label>
<input name="surname" class="input" value="{{ teacher.surname }}">

<label>Email</label>
<input name="email" class="input" value="{{ teacher.email }}">

<label>Address</label>
<input name="address" class="input" value="{{ teacher.address }}">

<label>Upload Photo</label>
<input type="file" name="photo" class="input">

<hr>
<button type="submit">Save Changes</button>

</form>

</div>

</body>
</html>
