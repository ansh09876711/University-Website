<!DOCTYPE html>
<html>

<head>

<title>Fee Receipts</title>

<style>

body{
font-family:Arial;
background:#eef2ff;
padding:40px;
}

h1{
color:#1e3a8a;
}

table{

width:100%;
border-collapse:collapse;
background:white;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

}

th,td{

padding:14px;
border-bottom:1px solid #eee;
text-align:center;

}

th{
background:#2563eb;
color:white;
}

tr:hover{
background:#f1f5f9;
}

.back{

margin-top:20px;
display:inline-block;
padding:10px 18px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:6px;

}

</style>

</head>

<body>

<h1>📄 Fee Receipts</h1>

<table>

<tr>
<th>Student Name</th>
<th>Amount Paid</th>
<th>Date</th>
</tr>

{% for row in data %}

<tr>
<td>{{ row[0] }}</td>
<td>₹ {{ row[1] }}</td>
<td>{{ row[2] }}</td>
</tr>

{% endfor %}

</table>

<a href="/accounts" class="back">← Back to Accounts Dashboard</a>

</body>
</html>
