<!DOCTYPE html>
<html>
<head>

<title>Fee Management</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
color:#1e3a8a;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#2563eb;
color:white;
}

button{
background:#2563eb;
border:none;
color:white;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<div class="container">

<h1>💳 Fee Management</h1>

<table>

<tr>
<th>Student ID</th>
<th>Name</th>
<th>Course</th>
<th>Fee Paid</th>
<th>Action</th>
</tr>

<tr>
<td>101</td>
<td>Rahul Sharma</td>
<td>CSE</td>
<td>₹50,000</td>
<td><button>Update</button></td>
</tr>

<tr>
<td>102</td>
<td>Ankit Verma</td>
<td>IT</td>
<td>₹45,000</td>
<td><button>Update</button></td>
</tr>

<tr>
<td>103</td>
<td>Pooja Singh</td>
<td>ECE</td>
<td>₹48,000</td>
<td><button>Update</button></td>
</tr>

</table>

</div>

</body>
</html>
