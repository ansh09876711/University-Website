<!DOCTYPE html>
<html>
<head>
<title>Time Table | EDUSTACK</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#3b1dd1,#7c3aed);
color:white;
}

.container{
padding:60px 20px;
text-align:center;
}

table{
width:90%;
margin:40px auto;
border-collapse:collapse;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
}

th,td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

th{
background:rgba(255,255,255,0.2);
}

tr:hover{
background:rgba(255,255,255,0.15);
}

</style>
</head>

<body>

<div class="container">

<h1>📅 Examination Time Table</h1>

<table>
<tr>
<th>Course</th>
<th>Date</th>
<th>Time</th>
</tr>

<tr>
<td>B.Tech CSE</td>
<td>12 March 2026</td>
<td>10:00 AM - 1:00 PM</td>
</tr>

<tr>
<td>MBA</td>
<td>14 March 2026</td>
<td>2:00 PM - 5:00 PM</td>
</tr>

<tr>
<td>M.Tech</td>
<td>16 March 2026</td>
<td>10:00 AM - 1:00 PM</td>
</tr>

</table>

</div>

</body>
</html>
