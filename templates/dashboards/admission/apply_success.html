<!DOCTYPE html>
<html>
<head>
<title>Application Submitted</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#2563eb,#1e3a8a);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:50px;
width:500px;
text-align:center;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
animation:fadeIn 0.6s ease-in-out;
}

.icon{
font-size:60px;
color:#16a34a;
margin-bottom:15px;
}

h2{
margin:10px 0;
color:#1e293b;
}

p{
color:#64748b;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:500;
transition:0.3s;
}

.btn:hover{
background:#1e40af;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<div class="icon">✅</div>

<h2>Application Submitted Successfully</h2>

<p>
Thank you for applying to <b>EDUSTACK University</b>.<br>
Our Admission Team will review your application shortly.
</p>

<a href="/" class="btn">🏠 Back to Home</a>

</div>

</body>
</html>
