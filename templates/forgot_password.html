<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>

<style>

body{
    font-family:Poppins, sans-serif;
    background:linear-gradient(135deg,#e9f0ff,#f8fbff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Card Box */
.forgot-box{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,0,0,0.08);
    width:360px;
    text-align:center;
}

/* Heading */
.forgot-box h2{
    margin-bottom:10px;
}

.forgot-box p{
    color:#666;
    font-size:14px;
    margin-bottom:20px;
}

/* Input */
.forgot-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #ddd;
    font-size:14px;
}

.forgot-box input:focus{
    outline:none;
    border:1px solid #2f5bea;
}

/* Button */
.forgot-box button{
    width:100%;
    padding:12px;
    background:#2f5bea;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    transition:0.3s;
}

.forgot-box button:hover{
    background:#1e45c9;
}

/* Back login */
.back{
    margin-top:15px;
    font-size:13px;
}

.back a{
    text-decoration:none;
    color:#2f5bea;
}

.back a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="forgot-box">

<h2>Forgot Password 🔑</h2>

<p>Enter your registered email to receive OTP</p>

<form method="POST">

    <input type="email"
           name="email"
           placeholder="Enter registered email"
           required>

    <button>Send OTP</button>

</form>

<div class="back">
    <a href="/login">← Back to Login</a>
</div>

</div>

</body>
</html>
