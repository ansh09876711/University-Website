<!DOCTYPE html>
<html>
<head>

<title>HOD Student Attendance</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6f9;
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.number{
font-size:28px;
font-weight:bold;
color:#007bff;
}

.chart-wrapper{
height:350px;
max-width:800px;
margin:auto;
}

</style>

</head>

<body>

<h2>📊 Student Attendance Overview</h2>

<div class="cards">

<div class="card">
Total Records
<div class="number">{{ stats.total_records }}</div>
</div>

<div class="card">
Present
<div class="number">{{ stats.present_count }}</div>
</div>

<div class="card">
Absent
<div class="number">{{ stats.absent_count }}</div>
</div>

</div>

<div class="chart-wrapper">
<canvas id="attendanceChart"></canvas>
</div>

<script>

const labels = [
{% for c in class_data %}
"{{ c.class_name }}",
{% endfor %}
];

const presentData = [
{% for c in class_data %}
{{ c.present }},
{% endfor %}
];

new Chart(document.getElementById('attendanceChart'), {
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Present Students',
data:presentData,
backgroundColor:'#36b9cc',
borderRadius:8
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

</script>

</body>
</html>
